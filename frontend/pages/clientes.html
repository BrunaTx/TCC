<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Essência do Mar - Clientes</title>

  <link rel="stylesheet" href="../styles/dashboard.css">
  <link rel="stylesheet" href="../styles/produtos.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand-row">
        <img src="../images/essencia.png" class="brand-logo">
        <div>
          <h1>Essência do Mar</h1>
          <p>Pontal do Paraná</p>
        </div>
      </div>
    </div>
    <nav class="menu">
      <a class="menu-item" href="dashboard.html"><span class="material-symbols-outlined">home</span>Página Inicial</a>
      <a class="menu-item" href="produtos.html"><span class="material-symbols-outlined">inventory_2</span>Produtos</a>
      <a class="menu-item" href="categorias.html"><span class="material-symbols-outlined">category</span>Categorias</a>
      <a class="menu-item active" href="#"><span class="material-symbols-outlined">person_add</span>Clientes</a>
      <a class="menu-item" href="vendas.html"><span class="material-symbols-outlined">point_of_sale</span>Vendas</a>
      <a class="menu-item" href="estoques.html"><span class="material-symbols-outlined">store</span>Estoque</a>
      <a class="menu-item" href="relatorios.html"><span class="material-symbols-outlined">description</span>Relatórios</a>
    </nav>
   <button class="settings-btn" onclick="window.location.href='/api/auth/logout'">
  <span class="material-symbols-outlined">logout</span>
  Sair
</button>
  </aside>

  <!-- CONTEÚDO -->
  <main class="content">
    <div class="card page-header">
      <h2>Clientes</h2>
      <button id="openModalBtn" class="primary-btn">+ Novo Cliente</button>
    </div>

    <div class="card products-section">
      <div class="toolbar">
        <label class="search-field">
          Pesquisar
          <input id="searchInput" type="search" placeholder="Buscar por nome ou CPF">
        </label>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>CPF</th>
              <th>Telefone</th>
              <th>Endereço</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="clientsTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- MODAL DE CLIENTE -->
    <div id="clientModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h3>Novo Cliente</h3>
          <button id="closeModalBtn" class="close-btn">×</button>
        </div>
        <form id="clientForm" class="product-form">
          <label>
            Nome
            <input type="text" name="nomeCliente" required>
          </label>
          <label>
            CPF
            <input type="text" name="cpfCliente" maxlength="11" required>
          </label>
          <label>
            Telefone
            <input type="text" name="telefoneCliente" maxlength="11" required>
          </label>
          <label>
            Endereço
            <input type="text" name="enderecoCliente" required>
          </label>
          <div class="form-actions">
            <button type="button" id="cancelModalBtn" class="btn-cancel">Cancelar</button>
            <button type="submit" class="btn-submit">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- MODAL DE COMPRAS -->
    <div id="purchasesModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h3>Compras do Cliente</h3>
          <button id="closePurchasesModalBtn" class="close-btn">×</button>
        </div>
        <div id="purchasesList" style="display:flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y:auto;"></div>
      </div>
    </div>

  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../js/clientes.js"></script>
</body>
</html>
