<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Essência do Mar - Login</title>
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="Formulário de login">
        <div class="brand-icon" aria-hidden="true">≋</div>

        <h1>A Essência do Mar</h1>
        <p class="subtitle">Sistema Administrativo</p>

        <form class="login-form" action="pages/dashboard.html">
          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="essenciamar@gmail.com" required />

          <label for="senha">Senha</label>
          <input id="senha" type="password" placeholder="123456" required />

         <button type="submit">Entrar</button>
        </form>

        <p class="footer-location">Pontal do Paraná - PR</p>
      </section>
    </main>
  </body>
</html>
