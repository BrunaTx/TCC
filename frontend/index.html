<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Essência do Mar - Login</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>

<body>
  <main class="page">
    <section class="card">
   <img 
              src="images/essencia.png" 
              alt="Logo Essência do Mar" 
              class="brand-icon"
            />
      <h1>Essência do Mar</h1>
      <p class="subtitle">Loja de Produtos Naturais</p>

      <form class="login-form" action="pages/dashboard.html">
        
        <label for="email">E-mail</label>
        <input
          id="email"
          type="email"
          placeholder="Digite seu e-mail"
          required
        />

        <label for="senha">Senha</label>

        <div class="password-field">
          <input
            id="senha"
            type="password"
            placeholder="Digite sua senha"
            required
          />
          <span class="eye"></span>
        </div>

        <button type="submit">Entrar</button>
      </form>

      <p class="footer-location">Pontal do Paraná - PR</p>
    </section>
  </main>
</body>
</html>
